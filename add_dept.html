<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตรวจสอบครุภัณฑ์คอมพิวเตอร์ - รพ.อุดรธานี</title>
    <!-- Google Fonts: Kanit -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SweetAlert2 สำหรับ Overlay/Modal -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(135deg, #fff0f5 0%, #ffffff 100%);
            min-height: 100vh;
            position: relative;
        }
        /* ลายน้ำ Watermark */
        .watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-30deg);
            font-size: 8rem;
            color: rgba(255, 182, 193, 0.15);
            font-weight: bold;
            pointer-events: none;
            z-index: 0;
            white-space: nowrap;
        }
        .content-wrapper {
            position: relative;
            z-index: 10;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }
        /* Print Friendly */
        @media print {
            body { background: white; }
            .no-print { display: none !important; }
            .watermark { color: rgba(0, 0, 0, 0.05); }
            @page { size: landscape; }
        }
    </style>
</head>
<body class="text-gray-800">

    <div class="watermark">IT UDON HOSP</div>

    <div class="content-wrapper container mx-auto px-4 py-6 max-w-5xl">
        
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 no-print">
            <!-- ปุ่มกลับเมนูหลัก -->
            <a href="https://dakdan.github.io/it_login/main_menu.html" class="flex items-center gap-2 px-4 py-2 bg-white rounded-xl shadow-sm text-gray-600 hover:text-pink-600 hover:bg-pink-50 transition-all border border-gray-100">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                กลับเมนูหลัก
            </a>

            <!-- ปุ่มสลับหน้า (Tabs) -->
            <div class="flex bg-white rounded-xl shadow-sm p-1 border border-gray-100">
                <button id="btnTabForm" onclick="switchView('form')" class="px-6 py-2 rounded-lg text-sm font-medium transition-all bg-pink-100 text-pink-700 shadow-sm">
                    ➕ ฟอร์มหน่วยงาน
                </button>
                <button id="btnTabList" onclick="switchView('list')" class="px-6 py-2 rounded-lg text-sm font-medium transition-all text-gray-500 hover:bg-gray-50">
                    📋 หน้ารายการ
                </button>
            </div>
        </div>

        <header class="flex flex-col items-center justify-center mb-8 text-center">
            <div class="logo-wrapper">
                <img src="logo02.png" alt="UDH Logo" class="w-24 h-24 object-contain mb-2 drop-shadow-sm bg-white rounded-full p-1 border border-pink-100">
            </div>
            <h1 class="text-3xl font-semibold text-pink-700">จัดการข้อมูลหน่วยงาน</h1>
            <h2 class="text-xl text-gray-600 mt-1">โรงพยาบาลอุดรธานี</h2>
            <h3 class="text-md text-pink-500">กลุ่มงาน:เทคโนโลยีสารสนเทศทางการแพทย์</h3>
        </header>

        <div id="formView" class="glass-card rounded-2xl p-6 md:p-8 no-print mb-8 transition-opacity duration-300">
            <div class="flex justify-between items-center border-b-2 border-pink-200 pb-2 mb-6">
                <h4 id="formTitle" class="text-xl font-medium text-pink-600">เพิ่มข้อมูลหน่วยงานใหม่</h4>
                <button type="button" id="btnCancelEdit" onclick="cancelEdit()" class="hidden text-sm px-3 py-1 bg-gray-100 text-gray-600 rounded-lg hover:bg-gray-200">ยกเลิกการแก้ไข</button>
            </div>
            
            <form id="deptForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium mb-1 text-gray-600">รหัสหน่วยงาน (DEP_ID)</label>
                    <input type="text" id="DEP_ID" required readonly class="w-full rounded-lg border-gray-300 border p-2.5 bg-gray-100 text-gray-500 cursor-not-allowed shadow-sm font-medium">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1 text-gray-600">ชื่อหน่วยงาน (DEPNAME)</label>
                    <input type="text" id="DEPNAME" required class="w-full rounded-lg border-gray-300 border p-2.5 focus:ring-pink-500 focus:border-pink-500 shadow-sm">
                </div>

                <div>
                    <label class="block text-sm font-medium mb-1 text-gray-600">สถานที่ (LOCATION)</label>
                    <select id="LOCATION_ID" required class="w-full rounded-lg border-gray-300 border p-2.5 focus:ring-pink-500 shadow-sm">
                        <option value="">-- กำลังโหลดข้อมูล... --</option>
                    </select>
                    <input type="hidden" id="LOCATION_NAME">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1 text-gray-600">ชั้น (FL)</label>
                    <select id="FL" required class="w-full rounded-lg border-gray-300 border p-2.5 focus:ring-pink-500 shadow-sm">
                        <option value="">-- กรุณาเลือกสถานที่ก่อน --</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-1 text-gray-600">ระบบงาน (JOBE_SYSTEMP)</label>
                    <select id="JOBE_SYSTEMP" required class="w-full rounded-lg border-gray-300 border p-2.5 shadow-sm">
                        <option value="IPD">IPD</option>
                        <option value="OPD">OPD</option>
                        <option value="Back Office">Back Office</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1 text-gray-600">เบอร์โทรภายใน (Tel)</label>
                    <input type="text" id="Tel" class="w-full rounded-lg border-gray-300 border p-2.5 shadow-sm">
                </div>

                <!-- สถานะการใช้งาน -->
                <div>
                    <label class="block text-sm font-medium mb-1 text-gray-600">สถานะ (ACTIVE)</label>
                    <select id="ACTIVE" required class="w-full rounded-lg border-gray-300 border p-2.5 focus:ring-pink-500 shadow-sm bg-white">
                        <option value="True">True</option>
                        <option value="False">False</option>
                    </select>
                </div>

                <!-- GPS & Camera -->
                <div class="col-span-1 md:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-6 p-4 bg-pink-50 rounded-xl border border-pink-100">
                    <div>
                        <label class="block text-sm font-medium mb-1 text-gray-600">พิกัด GPS</label>
                        <div class="flex gap-2">
                            <input type="text" id="GPS" readonly class="w-full rounded-lg border-gray-300 border p-2.5 bg-gray-100 cursor-not-allowed text-sm">
                            <button type="button" onclick="getLocation()" class="bg-pink-500 hover:bg-pink-600 text-white px-4 py-2 rounded-lg transition-colors whitespace-nowrap shadow-sm">ดึงพิกัด</button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1 text-gray-600">ถ่ายรูปสถานที่ / อัปโหลด</label>
                        <input type="file" id="IMAGE_UPLOAD" accept="image/*" capture="environment" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-pink-50 file:text-pink-700 hover:file:bg-pink-100 cursor-pointer">
                    </div>
                </div>

                <div class="col-span-1 md:col-span-2 flex justify-end gap-3 mt-4">
                    <button type="button" onclick="resetForm()" class="px-6 py-2 border border-gray-300 rounded-full text-gray-600 hover:bg-gray-50 transition-colors">ล้างข้อมูล</button>
                    <button type="submit" class="px-6 py-2 bg-gradient-to-r from-pink-500 to-pink-600 text-white rounded-full hover:from-pink-600 hover:to-pink-700 shadow-md transition-all">บันทึกข้อมูล</button>
                </div>
            </form>
        </div>

        <div id="listView" class="hidden glass-card rounded-2xl p-6 md:p-8 no-print mb-8 transition-opacity duration-300">
            <h4 class="text-xl font-medium text-pink-600 border-b-2 border-pink-200 pb-2 mb-6">รายการหน่วยงานทั้งหมด</h4>
            
            <!-- Search Bar -->
            <div class="flex flex-col md:flex-row gap-3 mb-6 bg-white p-3 rounded-xl shadow-sm border border-gray-100">
                <select id="searchType" class="rounded-lg border-gray-300 border p-2 focus:ring-pink-500 bg-gray-50">
                    <option value="dept">ค้นหาจาก ชื่อ/รหัสหน่วยงาน</option>
                    <option value="loc">ค้นหาจาก สถานที่ตั้ง</option>
                </select>
                <input type="text" id="searchInput" placeholder="พิมพ์คำค้นหา..." class="flex-1 rounded-lg border-gray-300 border p-2 focus:ring-pink-500 focus:border-pink-500">
            </div>

            <!-- List Container (Rendered via JS) -->
            <div id="listContainer" class="space-y-6">
                <!-- Data will be injected here -->
                <div class="text-center py-10 text-gray-400">กำลังโหลดข้อมูล...</div>
            </div>
        </div>

    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbwWRuMv63Y5ZBYf3G_ITvawVQ2tjszCF0QstJLd5wqVliGr69n_fueELaSi46DOnQyQZA/exec';
        
        let locationsData = [];
        let departmentsData = [];
        let imageBase64Data = null;
        let isEditMode = false;

        function generateNewDepId() {
            if (!departmentsData || departmentsData.length === 0) {
                return "DEP-1";
            }
            
            let maxNum = 0;
            departmentsData.forEach(dep => {
                if (dep.DEP_ID && String(dep.DEP_ID).toUpperCase().startsWith('DEP-')) {
                    const num = parseInt(String(dep.DEP_ID).substring(4), 10);
                    if (!isNaN(num) && num > maxNum) {
                        maxNum = num;
                    }
                }
            });
            
            return `DEP-${maxNum + 1}`;
        }

        document.addEventListener('DOMContentLoaded', () => {
            fetchInitialData();
            checkGPSPermission();

            const searchInput = document.getElementById('searchInput');
            if(searchInput) {
                searchInput.addEventListener('input', () => renderList());
            }
            const searchType = document.getElementById('searchType');
            if(searchType) {
                searchType.addEventListener('change', () => renderList());
            }
        });

        function switchView(view) {
            const formView = document.getElementById('formView');
            const listView = document.getElementById('listView');
            const btnTabForm = document.getElementById('btnTabForm');
            const btnTabList = document.getElementById('btnTabList');

            if (view === 'form') {
                formView.classList.remove('hidden');
                listView.classList.add('hidden');
                btnTabForm.className = "px-6 py-2 rounded-lg text-sm font-medium transition-all bg-pink-100 text-pink-700 shadow-sm";
                btnTabList.className = "px-6 py-2 rounded-lg text-sm font-medium transition-all text-gray-500 hover:bg-gray-50";
            } else {
                formView.classList.add('hidden');
                listView.classList.remove('hidden');
                btnTabList.className = "px-6 py-2 rounded-lg text-sm font-medium transition-all bg-pink-100 text-pink-700 shadow-sm";
                btnTabForm.className = "px-6 py-2 rounded-lg text-sm font-medium transition-all text-gray-500 hover:bg-gray-50";
                
                if (departmentsData.length === 0) fetchDepartments();
                else renderList();
            }
        }

        async function fetchInitialData() {
            try {
                Swal.fire({
                    title: 'กำลังเชื่อมต่อฐานข้อมูล...',
                    allowOutsideClick: false,
                    didOpen: () => { Swal.showLoading(); }
                });

                const locRes = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getLocations' }) });
                const locResult = await locRes.json();
                
                if(locResult.status === 'success') {
                    locationsData = locResult.data;
                    updateLocationDropdown();
                } else {
                    throw new Error("LOCATION: " + (locResult.message || 'ไม่สามารถดึงข้อมูลสถานที่ได้'));
                }

                await fetchDepartments(false); 
                
                Swal.close();
            } catch (error) {
                Swal.fire('เชื่อมต่อล้มเหลว', error.message || 'ไม่สามารถโหลดข้อมูลเริ่มต้นได้', 'error');
            }
        }

        async function fetchDepartments(showLoading = true) {
            try {
                if(showLoading) {
                    Swal.fire({ title: 'กำลังดึงข้อมูลหน่วยงาน...', text: 'กรุณารอสักครู่', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }});
                }
                const depRes = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getDepartments' }) });
                const depResult = await depRes.json();
                
                if(depResult.status === 'success') {
                    departmentsData = depResult.data;
                    
                    if (!isEditMode) {
                        document.getElementById('DEP_ID').value = generateNewDepId();
                    }

                    if(document.getElementById('listView') && document.getElementById('listView').classList.contains('hidden') === false) {
                        renderList();
                    }
                    if(showLoading) Swal.close();
                } else {
                    throw new Error("DEPARTMENT: " + (depResult.message || 'พบข้อผิดพลาดจากฐานข้อมูล'));
                }
            } catch (error) {
                if(showLoading) Swal.fire('เกิดข้อผิดพลาด', error.message || 'ไม่สามารถเชื่อมต่อ API ได้', 'error');
                throw error;
            }
        }

        function highlightText(text, term) {
            if (!term || !text) return text;
            const regex = new RegExp(`(${term})`, "gi");
            return String(text).replace(regex, `<mark class="bg-yellow-300 text-yellow-900 px-1 rounded-sm">$1</mark>`);
        }

        function renderList() {
            const container = document.getElementById('listContainer');
            if(!container) return;
            const searchInput = document.getElementById('searchInput');
            const searchTerm = searchInput ? searchInput.value.toLowerCase() : '';
            const searchTypeElem = document.getElementById('searchType');
            const searchType = searchTypeElem ? searchTypeElem.value : 'dept';

            // 1. Filter Data
            const filteredData = departmentsData.filter(dep => {
                if (!searchTerm) return true;
                if (searchType === 'dept') {
                    return (dep.DEPNAME && dep.DEPNAME.toLowerCase().includes(searchTerm)) || 
                           (dep.DEP_ID && dep.DEP_ID.toLowerCase().includes(searchTerm));
                } else if (searchType === 'loc') {
                    return (dep.LOCATION_NAME && dep.LOCATION_NAME.toLowerCase().includes(searchTerm));
                }
                return true;
            });

            // 2. Group by Location -> Floor
            const grouped = filteredData.reduce((acc, curr) => {
                const loc = curr.LOCATION_NAME || 'ไม่ระบุสถานที่';
                
                // การนำข้อมูลมาแสดง ดึงค่าตรงๆ โดยไม่ดัดแปลง
                const fl = curr.FL ? curr.FL : 'ไม่ระบุชั้น';
                
                if (!acc[loc]) acc[loc] = {};
                if (!acc[loc][fl]) acc[loc][fl] = [];
                acc[loc][fl].push(curr);
                return acc;
            }, {});

            // 3. Render HTML
            container.innerHTML = '';
        
            if (Object.keys(grouped).length === 0) {
                container.innerHTML = '<div class="text-center py-10 text-gray-500 bg-white rounded-xl border border-gray-100">ไม่พบข้อมูลที่ค้นหา</div>';
                return;
            }

            for (const loc in grouped) {
                const locCard = document.createElement('div');
                locCard.className = 'bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden mb-6'; 
            
                // Location Header
                let html = `
                    <div class="bg-gradient-to-r from-pink-100 to-pink-50 px-4 py-3 border-b border-pink-100 font-semibold text-pink-700 flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
                        ${loc}
                    </div>
                    <div class="p-4 space-y-4">
                `;

                // การจัดเรียง (Sort): ตัดอักษรออกเพื่อให้เหลือแต่ตัวเลขสำหรับเปรียบเทียบเท่านั้น โดยไม่ยุ่งกับข้อมูลที่แสดงผล
                const sortedFloors = Object.keys(grouped[loc]).sort((a, b) => {
                    const numA = parseInt(a.replace(/\D/g, '')) || 999;
                    const numB = parseInt(b.replace(/\D/g, '')) || 999;
                    return numA - numB;
                });

                // Floors within Location
                for (const fl of sortedFloors) {
                    html += `
                        <div>
                            <h6 class="text-sm font-bold text-gray-600 mb-3 border-l-4 border-pink-400 pl-2 ml-1">${fl}</h6>
                            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                    `;
                
                    // Departments within Floor
                    grouped[loc][fl].forEach(dep => {
                        // ตรวจสอบค่าว่างสถานะ ACTIVE โดยไม่แก้ไขการแสดงผลเดิม
                        let statusBadge = '';
                        const activeVal = (dep.ACTIVE === undefined || dep.ACTIVE === null) ? '' : String(dep.ACTIVE).trim();
                        
                        if (activeVal === '') {
                            statusBadge = `<span class="bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full text-[10px] font-semibold border border-gray-200">ไม่มีค่า</span>`;
                        } else {
                            const isActive = activeVal.toLowerCase() !== 'false';
                            statusBadge = isActive 
                                ? `<span class="bg-green-100 text-green-700 px-2 py-0.5 rounded-full text-[10px] font-semibold border border-green-200">True</span>`
                                : `<span class="bg-red-100 text-red-700 px-2 py-0.5 rounded-full text-[10px] font-semibold border border-red-200">False</span>`;
                        }

                        const dispName = searchType === 'dept' ? highlightText(dep.DEPNAME, searchTerm) : dep.DEPNAME;
                        const dispId = searchType === 'dept' ? highlightText(dep.DEP_ID, searchTerm) : dep.DEP_ID;

                        // รูปภาพจาก NOTE1
                        let imageHtml = '';
                        if (dep.NOTE1) {
                            imageHtml = `<img src="https://drive.google.com/uc?id=${dep.NOTE1}" alt="รูปหน่วยงาน" class="w-full h-32 object-cover rounded-lg mb-3 border border-gray-100" onerror="this.style.display='none'">`;
                        }

                        html += `
                            <div onclick="showDeptDetails('${dep.DEP_ID}')" class="flex flex-col p-3 rounded-lg border border-gray-200 hover:border-pink-400 hover:shadow-md cursor-pointer transition-all bg-white group relative overflow-hidden">
                                ${imageHtml}
                                <div class="flex justify-between items-start mb-1 gap-2">
                                    <div class="font-medium text-gray-800 group-hover:text-pink-600 pr-1 break-words leading-tight">${dispName}</div>
                                    <div class="shrink-0 mt-0.5">${statusBadge}</div>
                                </div>
                                <div class="text-xs text-gray-500 mt-2 flex justify-between items-center mt-auto pt-2">
                                    <span>รหัส: ${dispId}</span>
                                    <span class="bg-gray-100 px-2 py-0.5 rounded text-gray-600 font-medium">${dep.JOBE_SYSTEMP}</span>
                                </div>
                            </div>
                        `;
                    });

                    html += `</div></div>`;
                }
                
                locCard.innerHTML = html + `</div>`;
                container.appendChild(locCard);
            }
        }

        function showDeptDetails(depId) {
            const dep = departmentsData.find(d => d.DEP_ID === depId);
            if (!dep) return;

            // ตรวจสอบค่าว่างสำหรับหน้าแสดงรายละเอียด (Modal)
            let statusText = '';
            const activeVal = (dep.ACTIVE === undefined || dep.ACTIVE === null) ? '' : String(dep.ACTIVE).trim();
            if (activeVal === '') {
                statusText = '<span class="text-gray-500 font-medium">ไม่มีค่า</span>';
            } else {
                const isActive = activeVal.toLowerCase() !== 'false';
                statusText = isActive ? '<span class="text-green-600 font-medium">True</span>' : '<span class="text-red-600 font-medium">False</span>';
            }

            let fileStatusHtml = dep.NOTE1 ? 
                `<p class="text-green-600 mt-3 text-sm flex items-center justify-center gap-1 bg-green-50 p-2 rounded-lg border border-green-100"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg> มีไฟล์แนบในระบบแล้ว</p>` : '';

            Swal.fire({
                title: `<span class="text-pink-600 font-semibold text-xl">${dep.DEPNAME}</span>`,
                html: `
                    <div class="text-left text-sm text-gray-700 bg-gray-50 p-4 rounded-xl border border-gray-100 mt-2 space-y-2">
                        <div class="grid grid-cols-3 border-b border-gray-200 pb-2"><span class="text-gray-500 col-span-1">รหัสหน่วยงาน:</span> <span class="col-span-2 font-medium">${dep.DEP_ID}</span></div>
                        <div class="grid grid-cols-3 border-b border-gray-200 pb-2 pt-1"><span class="text-gray-500 col-span-1">สถานที่:</span> <span class="col-span-2 font-medium">${dep.LOCATION_NAME}</span></div>
                        <div class="grid grid-cols-3 border-b border-gray-200 pb-2 pt-1"><span class="text-gray-500 col-span-1">ชั้น:</span> <span class="col-span-2 font-medium">${dep.FL}</span></div>
                        <div class="grid grid-cols-3 border-b border-gray-200 pb-2 pt-1"><span class="text-gray-500 col-span-1">ระบบงาน:</span> <span class="col-span-2 font-medium">${dep.JOBE_SYSTEMP}</span></div>
                        <div class="grid grid-cols-3 border-b border-gray-200 pb-2 pt-1"><span class="text-gray-500 col-span-1">เบอร์โทร:</span> <span class="col-span-2 font-medium">${dep.Tel || '-'}</span></div>
                        <div class="grid grid-cols-3 border-b border-gray-200 pb-2 pt-1"><span class="text-gray-500 col-span-1">สถานะ:</span> <span class="col-span-2">${statusText}</span></div>
                        <div class="grid grid-cols-3 pt-1"><span class="text-gray-500 col-span-1">พิกัด GPS:</span> <span class="col-span-2 font-medium text-xs break-all">${dep.GPS || '-'}</span></div>
                    </div>
                    ${fileStatusHtml}
                `,
                showCancelButton: true,
                showDenyButton: true,
                confirmButtonText: '✏️ แก้ไขข้อมูล',
                denyButtonText: '🗑️ ลบข้อมูล',
                cancelButtonText: 'ปิดหน้าต่าง',
                confirmButtonColor: '#ec4899',
                denyButtonColor: '#ef4444',
                cancelButtonColor: '#9ca3af',
                customClass: { popup: 'rounded-2xl' }
            }).then((result) => {
                if (result.isConfirmed) {
                    prepareEdit(dep);
                } else if (result.isDenied) {
                    confirmDelete(dep.DEP_ID);
                }
            });
        }

        async function confirmDelete(depId) {
            const result = await Swal.fire({
                title: 'ยืนยันการลบข้อมูล?',
                text: "ข้อมูลนี้จะถูกลบออกจากฐานข้อมูลอย่างถาวร!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#9ca3af',
                confirmButtonText: 'ลบเลย!',
                cancelButtonText: 'ยกเลิก'
            });

            if (result.isConfirmed) {
                Swal.fire({ title: 'กำลังลบ...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }});
                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'deleteDepartment', payload: { DEP_ID: depId } })
                    });
                    const res = await response.json();
                    if(res.status === 'success') {
                        Swal.fire('สำเร็จ!', 'ลบข้อมูลเรียบร้อยแล้ว', 'success');
                        await fetchDepartments(false);
                    } else {
                        throw new Error(res.message);
                    }
                } catch (e) {
                    Swal.fire('ข้อผิดพลาด', e.message || 'ไม่สามารถลบข้อมูลได้', 'error');
                }
            }
        }

        function prepareEdit(dep) {
            isEditMode = true;
            document.getElementById('formTitle').innerText = `แก้ไขข้อมูล: ${dep.DEPNAME}`;
            document.getElementById('btnCancelEdit').classList.remove('hidden');

            const depIdInput = document.getElementById('DEP_ID');
            depIdInput.value = dep.DEP_ID;
            
            document.getElementById('DEPNAME').value = dep.DEPNAME || '';
            document.getElementById('JOBE_SYSTEMP').value = dep.JOBE_SYSTEMP || 'IPD';
            document.getElementById('Tel').value = dep.Tel || '';
            document.getElementById('GPS').value = dep.GPS || '';
            
            // ตรวจสอบค่าว่างสำหรับฟอร์มแก้ไข
            const activeVal = (dep.ACTIVE === undefined || dep.ACTIVE === null) ? '' : String(dep.ACTIVE).trim();
            if (activeVal === '') {
                document.getElementById('ACTIVE').value = 'True'; // หากว่างให้ตั้งเป็นค่าเริ่มต้น
            } else {
                document.getElementById('ACTIVE').value = activeVal.toLowerCase() === 'false' ? 'False' : 'True';
            }

            const locSelect = document.getElementById('LOCATION_ID');
            let foundLoc = false;
            for(let i=0; i<locSelect.options.length; i++) {
                if(String(locSelect.options[i].value).trim() === String(dep.LOCATION_ID).trim() || 
                   String(locSelect.options[i].text).trim() === String(dep.LOCATION_NAME).trim()) {
                    locSelect.selectedIndex = i;
                    foundLoc = true;
                    break;
                }
            }

            document.getElementById('LOCATION_NAME').value = dep.LOCATION_NAME || '';
            
            const event = new Event('change');
            locSelect.dispatchEvent(event);
            
            const flSelect = document.getElementById('FL');
            let foundFl = false;
            const depFl = String(dep.FL).trim(); 

            // ใช้การเปรียบเทียบข้อความแบบตรงๆ 100% ไม่ตัดอักษรออก
            for(let i=0; i<flSelect.options.length; i++) {
                const optValue = String(flSelect.options[i].value).trim();
                const optText = String(flSelect.options[i].text).trim();

                if(optValue === depFl || optText === depFl) {
                    flSelect.selectedIndex = i;
                    foundFl = true;
                    break;
                }
            }

            // ถ้าหาไม่เจอจริงๆ ก็ให้สร้าง option ตัวนั้นขึ้นมาแทน
            if(!foundFl && dep.FL) {
                const opt = document.createElement('option');
                opt.value = dep.FL;
                opt.text = dep.FL;
                flSelect.appendChild(opt);
                flSelect.value = dep.FL;
            }

            switchView('form');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cancelEdit() {
            isEditMode = false;
            document.getElementById('formTitle').innerText = 'เพิ่มข้อมูลหน่วยงานใหม่';
            document.getElementById('btnCancelEdit').classList.add('hidden');
            resetForm();
        }

        document.getElementById('IMAGE_UPLOAD').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) { imageBase64Data = event.target.result; };
                reader.readAsDataURL(file);
            }
        });

        function checkGPSPermission() {
            if (!("geolocation" in navigator)) {
                Swal.fire('ข้อผิดพลาด', 'อุปกรณ์นี้ไม่รองรับการระบุตำแหน่ง GPS', 'error');
            }
        }

        function getLocation() {
            Swal.fire({ title: 'กำลังค้นหาพิกัด...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }});
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    document.getElementById('GPS').value = `${position.coords.latitude}, ${position.coords.longitude}`;
                    Swal.fire({ title: 'สำเร็จ', text: 'ดึงพิกัด GPS เรียบร้อยแล้ว', icon: 'success', timer: 1500, showConfirmButton: false });
                },
                (error) => { Swal.fire('เกิดข้อผิดพลาด', 'ไม่สามารถดึงตำแหน่งได้ กรุณาเปิด GPS', 'error'); },
                { enableHighAccuracy: true }
            );
        }

        function updateLocationDropdown() {
            const locSelect = document.getElementById('LOCATION_ID');
            locSelect.innerHTML = '<option value="">-- เลือกสถานที่ --</option>';
            locationsData.forEach(loc => {
                const opt = document.createElement('option');
                opt.value = loc.LOC_ID;
                opt.text = loc.LOC_NAME_TH;
                opt.dataset.floorCount = loc.LOC_FLOOR_COUNT;
                locSelect.appendChild(opt);
            });
        }

        document.getElementById('LOCATION_ID').addEventListener('change', function(e) {
            const selectedOption = this.options[this.selectedIndex];
            document.getElementById('LOCATION_NAME').value = selectedOption ? selectedOption.text : '';
            
            const floorCount = selectedOption ? (parseInt(selectedOption.dataset.floorCount) || 0) : 0;
            const flSelect = document.getElementById('FL');
            
            flSelect.innerHTML = '<option value="">-- เลือก --</option>'; // เปลี่ยนเอาคำว่าชั้นออก
            for(let i = 1; i <= floorCount; i++) {
                const opt = document.createElement('option');
                opt.value = `F ${i}`;  
                opt.text = `F ${i}`;   
                flSelect.appendChild(opt);
            }
        });

        document.getElementById('deptForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const payload = {
                DEP_ID: document.getElementById('DEP_ID').value,
                DEPNAME: document.getElementById('DEPNAME').value,
                LOCATION_ID: document.getElementById('LOCATION_ID').value,
                LOCATION_NAME: document.getElementById('LOCATION_NAME').value,
                FL: document.getElementById('FL').value,
                JOBE_SYSTEMP: document.getElementById('JOBE_SYSTEMP').value,
                Tel: document.getElementById('Tel').value,
                ACTIVE: document.getElementById('ACTIVE').value,
                GPS: document.getElementById('GPS').value,
                imageBase64: imageBase64Data
            };

            if (isEditMode) {
                const existingDep = departmentsData.find(d => d.DEP_ID === payload.DEP_ID);
                if (existingDep) {
                    payload.NOTE1 = existingDep.NOTE1;
                    payload.DEPT_PHO = existingDep.DEPT_PHO;
                }
            }

            Swal.fire({
                title: isEditMode ? 'กำลังอัปเดตข้อมูล...' : 'กำลังบันทึกข้อมูล...',
                text: 'กรุณารอสักครู่',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); }
            });

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'saveDepartment', payload: payload })
                });
                const result = await response.json();

                if(result.status === 'success') {
                    Swal.fire({
                        title: 'สำเร็จ!',
                        text: result.message,
                        icon: 'success',
                        confirmButtonColor: '#ec4899'
                    }).then(() => {
                        cancelEdit();
                        fetchDepartments(); 
                    });
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                Swal.fire('ข้อผิดพลาด', error.message || 'บันทึกข้อมูลไม่สำเร็จ', 'error');
            }
        });

        function resetForm() {
            if (isEditMode) {
                cancelEdit();
                return;
            }
            document.getElementById('deptForm').reset();
            document.getElementById('FL').innerHTML = '<option value="">-- กรุณาเลือกสถานที่ก่อน --</option>';
            imageBase64Data = null;
            
            document.getElementById('DEP_ID').value = generateNewDepId();
        }
    </script>
</body>
</html>
