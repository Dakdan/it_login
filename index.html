<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Service Login - รพ.อุดรธานี</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --pink-soft: #fff5f7;
            --pink-primary: #ff85a2;
            --pink-dark: #d63384;
            --white: #ffffff;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(135deg, var(--white) 0%, var(--pink-soft) 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* ลายน้ำ IT UDON HOSP */
        body::before {
            content: "IT UDON HOSP";
            position: absolute;
            font-size: 10vw;
            color: rgba(214, 51, 132, 0.03);
            font-weight: 800;
            transform: rotate(-25deg);
            white-space: nowrap;
            z-index: -1;
            pointer-events: none;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(255, 133, 162, 0.1);
            width: 100%;
            max-width: 420px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
        }

        .header-box {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-img {
            width: 70px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
            margin-bottom: 1rem;
        }

        .title-main {
            color: var(--pink-dark);
            font-weight: 500;
            font-size: 1.25rem;
            line-height: 1.2;
        }

        .title-sub {
            color: #777;
            font-size: 0.85rem;
            margin-top: 5px;
        }

        .form-label {
            font-size: 0.9rem;
            color: #666;
            margin-left: 5px;
        }

        .form-control {
            border-radius: 15px;
            padding: 12px 18px;
            border: 1.5px solid #ffeef2;
            background: #fff;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--pink-primary);
            box-shadow: 0 0 0 4px rgba(255, 133, 162, 0.15);
        }

        .btn-submit {
            background: linear-gradient(to right, #ff85a2, #ff6b8d);
            color: white;
            border: none;
            border-radius: 15px;
            padding: 14px;
            width: 100%;
            font-weight: 500;
            margin-top: 1rem;
            transition: 0.3s;
            box-shadow: 0 8px 20px rgba(255, 133, 162, 0.3);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 133, 162, 0.4);
        }

        /* Loading Overlay */
        #loadingOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.8);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .spinner-pink {
            width: 3rem; height: 3rem;
            color: var(--pink-primary);
        }

        /* Modal Style */
        .modal-content { border-radius: 20px; border: none; }
        .modal-body { padding: 3rem; }

        @media (max-width: 480px) {
            .login-card { padding: 1.5rem; margin: 15px; }
        }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <div class="spinner-border spinner-pink" role="status"></div>
    <div class="mt-3" style="color: var(--pink-dark);">กำลังเข้าสู่ระบบ...</div>
</div>

<div class="login-card">
    <div class="header-box">
        <img src="https://img5.pic.in.th/file/secure-sv1/logo19a19087a17ab587.png
">
        <div class="title-main">ระบบตรวจสอบครุภัณฑ์คอมพิวเตอร์</div>
        <div class="title-sub">โรงพยาบาลอุดรธานี</div>
        <div class="title-sub" style="font-size: 0.75rem;">กลุ่มงานเทคโนโลยีสารสนเทศทางการแพทย์</div>
    </div>

    <form id="loginForm">
        <div class="mb-3">
            <label class="form-label">ชื่อผู้ใช้งาน (User Login)</label>
            <input type="text" id="userpn" class="form-control" placeholder="กรอกชื่อผู้ใช้งาน" required>
        </div>
        <div class="mb-4">
            <label class="form-label">รหัสผ่าน (Password)</label>
            <input type="password" id="userpw" class="form-control" placeholder="กรอกรหัสผ่าน" required>
        </div>
        <button type="submit" class="btn btn-submit">ตกลง</button>
    </form>
</div>

<div class="modal fade" id="alertModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-body text-center">
                <div id="alertIcon" style="font-size: 4rem;" class="mb-3"></div>
                <h4 id="alertTitle" class="mb-2"></h4>
                <p id="alertMsg" class="text-muted mb-4"></p>
                <button type="button" class="btn btn-submit w-50" data-bs-dismiss="modal">ปิด</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // URL Web App จากที่คุณส่งมา
    const API_URL = "https://script.google.com/macros/s/AKfycbwPk2LYTrUxUkEZmTuwrZ6vWtInLSbzTC7fscaKo7AENJ3cua0Nufl36OCFES3fqGw8hg/exec";

    const loginForm = document.getElementById('loginForm');
    const loading = document.getElementById('loadingOverlay');

    loginForm.addEventListener('submit', function(e) {
        e.preventDefault();
        loading.style.display = 'flex';

        const payload = {
            action: 'login',
            username: document.getElementById('userpn').value,
            password: document.getElementById('userpw').value
        };

        fetch(API_URL, {
            method: 'POST',
            mode: 'no-cors', // สำคัญสำหรับ Apps Script POST
            body: JSON.stringify(payload)
        })
        .then(() => {
            // เนื่องจากโหมด no-cors ไม่สามารถอ่านค่า response ได้โดยตรง
            // แนะนำให้ใช้การ fetch แบบปกติถ้า Apps Script ตั้งค่า CORS ไว้แล้ว
            // หรือใช้ Google.script.run ถ้าอยู่ในระบบเดียวกัน
            // ในที่นี้จะลอง fetch แบบปกติก่อนเพื่อเอา JSON:
            return fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            });
        })
        .then(res => res.json())
        .then(res => {
            loading.style.display = 'none';
            if(res.success) {
                localStorage.setItem('currentUser', JSON.stringify(res.data));
                showAlert('สำเร็จ!', 'ยินดีต้อนรับคุณ ' + res.data.UserName, 'success');
                // ตัวอย่าง: ไปหน้าหลักหลัง login 2 วินาที
                // setTimeout(() => { window.location.href = 'dashboard.html'; }, 2000);
            } else {
                showAlert('ขออภัย', res.message, 'error');
            }
        })
        .catch(err => {
            loading.style.display = 'none';
            showAlert('ผิดพลาด', 'ไม่สามารถเชื่อมต่อฐานข้อมูลได้', 'error');
            console.error(err);
        });
    });

    function showAlert(title, msg, type) {
        const modal = new bootstrap.Modal(document.getElementById('alertModal'));
        document.getElementById('alertTitle').innerText = title;
        document.getElementById('alertMsg').innerText = msg;
        document.getElementById('alertIcon').innerHTML = (type === 'success') ? '🌸' : '❌';
        modal.show();
    }
</script>
</body>
</html>
