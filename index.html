<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT UDON HOSP - Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Kanit', sans-serif; background: linear-gradient(135deg, #fff0f5 0%, #ffffff 100%); min-height: 100vh; color: #4a5568; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .watermark { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-30deg); font-size: 8rem; color: rgba(236, 72, 153, 0.03); pointer-events: none; z-index: 0; white-space: nowrap; font-weight: bold; }
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: white; border-top: 1px solid #fecdd3; z-index: 50; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="pb-24">
    <div class="watermark">IT UDON HOSP</div>

    <div class="relative z-10 p-4 md:p-8 max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-8 pb-4 border-b border-pink-100">
            <div class="flex items-center gap-4">
                <img src="udhlogo4.png" alt="Logo" class="w-12 h-12 object-contain" onerror="this.src='https://placehold.co/100x100/pink/white?text=LOGO'">
                <div>
                    <h1 class="text-xl md:text-2xl font-bold text-gray-800">โรงพยาบาลอุดรธานี</h1>
                    <p class="text-pink-600 text-xs md:text-sm">กลุ่มงานเทคโนโลยีสารสนเทศทางการแพทย์</p>
                </div>
            </div>
        </header>

        <div id="content" class="space-y-8">
            <div class="text-center py-20 text-gray-400">
                <i class="fa-solid fa-spinner fa-spin text-2xl mb-2"></i>
                <p>กำลังดึงข้อมูลจากระบบ...</p>
            </div>
        </div>
    </div>

    <nav class="nav-bar p-4 flex justify-around items-center no-print">
        <button onclick="window.location.reload()" class="text-pink-500"><i class="fa-solid fa-house text-2xl"></i></button>
        <button onclick="console.log('QR Scanner Triggered')" class="bg-pink-500 text-white p-4 rounded-full -mt-10 shadow-lg border-4 border-white"><i class="fa-solid fa-qrcode text-2xl"></i></button>
        <button onclick="console.log('Alert Triggered')" class="text-pink-500"><i class="fa-solid fa-bell text-2xl"></i></button>
    </nav>

    <script>
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwBBEOsw0LV49luy5XBA-D46XldxIj8m91ICNOg2ulwclJUBuUCQw8Qmq9-dKAyF5rA/exec';

        async function fetchData() {
            try {
                const response = await fetch(`${APPS_SCRIPT_URL}?action=getAppData`);
                const data = await response.json();
                renderUI(data);
            } catch (err) {
                console.error("Fetch Error:", err);
                document.getElementById('content').innerHTML = `
                    <div class="text-red-500 text-center p-8 bg-white rounded-2xl shadow-sm">
                        <i class="fa-solid fa-circle-exclamation text-3xl mb-2"></i>
                        <p>ไม่สามารถเชื่อมต่อข้อมูลได้ กรุณาตรวจสอบการตั้งค่า Apps Script</p>
                    </div>`;
            }
        }

        function renderUI(data) {
            const content = document.getElementById('content');
            if(!data || !data.menus || data.menus.length === 0) { 
                content.innerHTML = `<div class="text-center text-gray-400">ไม่พบข้อมูลเมนูในระบบ</div>`; 
                return; 
            }
            
            const groups = data.menus.reduce((acc, m) => {
                const g = m.MAIN_MENU || 'อื่นๆ';
                if (!acc[g]) acc[g] = [];
                acc[g].push(m);
                return acc;
            }, {});

            content.innerHTML = Object.entries(groups).map(([group, items]) => `
                <section>
                    <h2 class="text-lg font-bold text-gray-700 mb-4 px-2 border-l-4 border-pink-500">${group}</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        ${items.map(m => `
                            <div class="glass p-4 rounded-2xl flex items-center gap-4 hover:shadow-lg cursor-pointer transition" onclick="window.open('${m.LINK_URL}', '_blank')">
                                <div class="w-12 h-12 bg-pink-100 rounded-full flex items-center justify-center text-pink-600"><i class="fa-solid fa-${m.ICON || 'link'}"></i></div>
                                <div><h3 class="font-bold">${m.MENU_NAME}</h3><p class="text-xs text-gray-500">${m.DESC || ''}</p></div>
                            </div>
                        `).join('')}
                    </div>
                </section>
            `).join('');
        }

        // Initial trigger
        window.onload = fetchData;
    </script>
</body>
</html>
