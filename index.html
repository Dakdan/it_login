<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Maintenance And Service - รพ.อุดรธานี</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --pink-soft: #fff5f7;
            --pink-primary: #ff85a2;
            --pink-dark: #d63384;
            --white: #ffffff;
            --gray-text: #666666;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(135deg, var(--white) 0%, var(--pink-soft) 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* ลายน้ำ IT UDON HOSP */
        body::before {
            content: "IT UDON HOSP";
            position: absolute;
            font-size: 10vw;
            color: rgba(214, 51, 132, 0.03);
            font-weight: 800;
            transform: rotate(-25deg);
            white-space: nowrap;
            z-index: -1;
            pointer-events: none;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(255, 133, 162, 0.12);
            width: 100%;
            max-width: 440px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            padding: 3rem 2rem;
            text-align: center;
            transition: all 0.3s ease-in-out;
        }

        /* ส่วนหัวและโลโก้วงกลม */
        .header-box {
            margin-bottom: 2rem;
        }

        .logo-wrapper {
            width: 130px;
            height: 130px;
            margin: 0 auto 1.25rem;
            background: white;
            border-radius: 50%;
            padding: 5px;
            box-shadow: 0 10px 25px rgba(214, 51, 132, 0.15);
            border: 3px solid var(--pink-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .logo-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 50%;
        }

        .title-main {
            color: var(--pink-dark);
            font-weight: 600;
            font-size: 1.35rem;
            margin-bottom: 0.3rem;
        }

        .title-sub {
            color: var(--gray-text);
            font-size: 0.9rem;
            line-height: 1.4;
        }

        /* ฟอร์ม */
        .form-label {
            display: block;
            text-align: left;
            font-size: 0.85rem;
            color: #444;
            margin-bottom: 6px;
            margin-left: 5px;
            font-weight: 500;
        }

        .form-control {
            border-radius: 12px;
            padding: 10px 18px;
            border: 1.5px solid #ffeef2;
            background: #fff;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .form-control:focus {
            border-color: var(--pink-primary);
            box-shadow: 0 0 0 4px rgba(255, 133, 162, 0.15);
            outline: none;
        }

        .btn-submit {
            background: linear-gradient(45deg, #ff85a2, #d63384);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px;
            width: 100%;
            font-weight: 500;
            font-size: 1.05rem;
            margin-top: 1rem;
            transition: all 0.3s;
            box-shadow: 0 6px 15px rgba(214, 51, 132, 0.2);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(214, 51, 132, 0.3);
            color: white;
        }

        .btn-link-action {
            color: var(--pink-dark);
            font-size: 0.85rem;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
            cursor: pointer;
        }

        .btn-link-action:hover {
            color: #b8226b;
            text-decoration: underline;
        }

        .divider {
            height: 1px;
            background-color: #ffeef2;
            margin: 1.5rem 0;
        }

        /* Loading */
        #loadingOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.85);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .form-transition {
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .login-card { padding: 2rem 1.25rem; margin: 15px; }
            .logo-wrapper { width: 110px; height: 110px; }
        }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <div class="spinner-border text-danger" style="width: 3rem; height: 3rem;" role="status"></div>
    <div class="mt-3 text-pink-dark fw-bold" id="loadingText">กำลังดำเนินการ...</div>
</div>

<div class="login-card">
    <div class="header-box">
        <div class="logo-wrapper">
            <img src="https://img2.pic.in.th/logo18fee7f1cab4f0ab8.png" alt="UDH Logo" class="logo-img">
        </div>
        <div class="title-main">IT UDON HOSP App</div>
        <div class="title-sub fw-medium">โรงพยาบาลอุดรธานี</div>
    </div>

    <div id="loginState" class="form-transition">
        <form id="loginForm">
            <div class="mb-3 text-start">
                <label class="form-label" for="userpn"><i class="fa-solid fa-user me-1 text-secondary"></i> ชื่อผู้ใช้งาน (User Login)</label>
                <input type="text" id="userpn" class="form-control" placeholder="กรอกชื่อผู้ใช้งาน" required autocomplete="username">
            </div>
            <div class="mb-3 text-start">
                <label class="form-label" for="userpw"><i class="fa-solid fa-lock me-1 text-secondary"></i> รหัสผ่าน (Password)</label>
                <input type="password" id="userpw" class="form-control" placeholder="กรอกรหัสผ่าน" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-submit"><i class="fa-solid fa-right-to-bracket me-2"></i>เข้าสู่ระบบ</button>
        </form>
    </div>
</div>

<div class="modal fade" id="alertModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 rounded-4">
            <div class="modal-body text-center p-5">
                <div id="alertIcon" style="font-size: 4.5rem;" class="mb-3"></div>
                <h4 id="alertTitle" class="mb-2 fw-semibold"></h4>
                <p id="alertMsg" class="text-muted mb-4"></p>
                <button type="button" id="btnModalClose" class="btn btn-submit w-100" data-bs-dismiss="modal">ปิดหน้าต่าง</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_URL = "https://script.google.com/macros/s/AKfycby5WekOkEZJBTR-uC-HRSpyBx9BMoWoI10pyrgcKS9AGmWQdNG2UsThnYaaM55C2xKP/exec";
    const loginForm = document.getElementById('loginForm');
    const loading = document.getElementById('loadingOverlay');

    loginForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        const username = document.getElementById('userpn').value.trim();
        const password = document.getElementById('userpw').value;

        loading.style.display = 'flex';

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: 'login',
                    username: username,
                    password: password
                }),
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }
            });

            const result = await response.json();
            loading.style.display = 'none';

            if (!result.success) {
                showAlert('เข้าสู่ระบบไม่สำเร็จ', result.message, 'error');
                return;
            }

            localStorage.setItem('currentUser', JSON.stringify(result.data));

            if (result.resetRequired === true) {
                window.location.href = 'change-password.html';
                return;
            }

            window.location.href = 'main_menu.html';
        } catch (err) {
            loading.style.display = 'none';
            console.error(err);
            showAlert('ระบบขัดข้อง', 'ไม่สามารถเชื่อมต่อ Server ได้', 'error');
        }
    });

    function logout() {
        localStorage.removeItem('currentUser');
        window.location.href = 'index.html';
    }

    function getCurrentUser() {
        return JSON.parse(localStorage.getItem('currentUser'));
    }

    function showAlert(title, msg, type) {
        const modal = new bootstrap.Modal(document.getElementById('alertModal'));
        document.getElementById('alertTitle').innerText = title;
        document.getElementById('alertMsg').innerText = msg;
        document.getElementById('alertIcon').innerHTML = type === 'error' ? '❌' : '🌸';
        modal.show();
    }
</script>
</body>
</html>
